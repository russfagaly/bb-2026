name: Build Stats Site

on:
  push:
    branches: [main]
    paths:
      - 'Stats/games/**'
      - 'Stats/pipeline/compile_html.py'
      - 'Stats/pipeline/name_registry.py'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate index.html
        run: python3 Stats/pipeline/compile_html.py

      - name: Commit and push index.html
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 Auto-update stats site [skip ci]"
          git push
